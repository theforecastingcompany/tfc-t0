name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor, a mid version, and the ceiling of requires-python.
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Import smoke
        run: uv run python -c "from t0 import T0Config, T0Forecaster; print(T0Config.medium())"
