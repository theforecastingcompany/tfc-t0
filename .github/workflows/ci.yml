name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Import smoke
        run: uv run python -c "from t0 import T0Config, T0Forecaster; print(T0Config.medium())"
